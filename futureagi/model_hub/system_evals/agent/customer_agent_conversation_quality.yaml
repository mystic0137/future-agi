eval_id: 117
name: customer_agent_conversation_quality
description: Conversation-level quality metric that assesses overall user experience.
criteria: "You are evaluating the overall quality of the customer-agent interaction.\n\n## Criteria\n\n1. Resolution effectiveness: The customer's underlying issue or need should be substantively addressed by the end of the conversation.\n   - Score 5: Issue is fully resolved or a concrete next step is committed to.\n   - Score 1: Issue is left unresolved with no clear path forward.\n\n2. Professional tone: The agent should communicate with courtesy, patience, and appropriate empathy throughout.\n   - Score 5: Consistently warm, respectful, and empathetic across the entire conversation.\n   - Score 1: Rude, dismissive, or impatient at multiple points.\n\n3. Conversational efficiency: Information should be exchanged with minimal redundancy and unnecessary back-and-forth.\n   - Score 5: Lean conversation with no avoidable detours; each turn moves toward resolution.\n   - Score 1: Excessive back-and-forth, repeated questions, or off-topic detours that prolong the conversation.\n\n## Anti-bias Rules\n\n- A short conversation that efficiently resolves a simple issue CAN score '5'.\n- Score each criterion independently; an agent strong on tone but weak on resolution should still score low on Resolution effectiveness.\n- Evaluate based on agent behavior, not difficulty of the request.\n\n## Scoring\n\nSelect '1' for very poor: significant failure across the three dimensions. Select '2' for poor: meaningful gaps in one or more dimensions. Select '3' for adequate: meets the minimum bar across dimensions without distinction. Select '4' for good: strong on most dimensions with minor issues. Select '5' for excellent: strong across all three dimensions.\n\n## Inputs\n\n<conversation>{{conversation}}</conversation>"
eval_tags:
- Agents
- Conversation
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
choices:
- '1'
- '2'
- '3'
- '4'
- '5'
output_type_normalized: deterministic
config:
  required_keys:
  - conversation
  output: choices
  eval_type_id: AgentEvaluator
  param_modalities:
    conversation:
    - TEXT
    - AUDIO
    - JSON
    - LIST
    - NUMBER
    - BOOLEAN
    - INTEGER
    - FLOAT
    - ARRAY
    - DATETIME
  config_params_desc:
    conversation: The conversation to be evaluated
  rule_prompt: "You are evaluating the overall quality of the customer-agent interaction.\n\n## Criteria\n\n1. Resolution effectiveness: The customer's underlying issue or need should be substantively addressed by the end of the conversation.\n   - Score 5: Issue is fully resolved or a concrete next step is committed to.\n   - Score 1: Issue is left unresolved with no clear path forward.\n\n2. Professional tone: The agent should communicate with courtesy, patience, and appropriate empathy throughout.\n   - Score 5: Consistently warm, respectful, and empathetic across the entire conversation.\n   - Score 1: Rude, dismissive, or impatient at multiple points.\n\n3. Conversational efficiency: Information should be exchanged with minimal redundancy and unnecessary back-and-forth.\n   - Score 5: Lean conversation with no avoidable detours; each turn moves toward resolution.\n   - Score 1: Excessive back-and-forth, repeated questions, or off-topic detours that prolong the conversation.\n\n## Anti-bias Rules\n\n- A short conversation that efficiently resolves a simple issue CAN score '5'.\n- Score each criterion independently; an agent strong on tone but weak on resolution should still score low on Resolution effectiveness.\n- Evaluate based on agent behavior, not difficulty of the request.\n\n## Scoring\n\nSelect '1' for very poor: significant failure across the three dimensions. Select '2' for poor: meaningful gaps in one or more dimensions. Select '3' for adequate: meets the minimum bar across dimensions without distinction. Select '4' for good: strong on most dimensions with minor issues. Select '5' for excellent: strong across all three dimensions.\n\n## Inputs\n\n<conversation>{{conversation}}</conversation>"
choice_scores:
  '1': 0.0
  '2': 0.25
  '3': 0.5
  '4': 0.75
  '5': 1.0
