eval_id: 16
name: tone
description: Analyzes the tone and sentiment of content
criteria: "You are evaluating the emotional tone of the output and classifying it using the provided tone labels.\n\n## Criteria\n\n1. Label coverage: Every distinct emotional state present in the text should receive its corresponding label, none missed.\n   - Pass: \"I'm thrilled but worried about the timeline\" -> joy + fear (both selected).\n   - Fail: Selects only joy when fear is also clearly expressed.\n\n2. Label precision: Each selected label must be grounded in specific textual evidence; no false positives.\n   - Pass: Selects 'anger' only when hostile language or angry markers are present.\n   - Fail: Assigns 'joy' to polite professional language that has no emotional markers.\n\n3. Surface vs. intent: Sarcastic or ironic content is classified by its underlying emotion, not its literal wording.\n   - Pass: \"Oh great, another delay...\" -> annoyance (not joy).\n   - Fail: Labels sarcastic praise as 'joy' based on the surface words.\n\n## Anti-bias Rules\n\n- DO NOT classify polite professional language as 'joy' or 'love'; assign 'neutral' when no emotional markers are present.\n- Short or ambiguous content should receive fewer labels; avoid over-classification.\n- Multiple labels are appropriate only when multiple distinct emotional states are simultaneously expressed.\n\n## Scoring\n\nSelect every label that reflects a distinct emotional state present in the content. Available labels: neutral, joy, love, fear, surprise, sadness, anger, annoyance, confusion. Assign 'neutral' for calm, factual content with no emotional markers. Only select labels grounded in specific textual evidence.\n\n## Inputs\n\n<output>{{output}}</output>"
