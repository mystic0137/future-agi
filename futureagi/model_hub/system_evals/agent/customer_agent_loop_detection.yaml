eval_id: 112
name: customer_agent_loop_detection
description: Identifies if the bot gets stuck asking the same question repeatedly or circling back in loops.
criteria: "You are evaluating whether the agent gets stuck in repetitive loops during the conversation.\n\n## Criteria\n\n1. Repetitive utterances: The agent reuses the same question or the same fallback response despite having already received relevant input.\n   - Never: Each question or fallback is used at most once when warranted.\n   - Always: The agent repeats the same question or \"Let me check on that\" three or more times despite prior answers.\n\n2. Multi-turn cycles: The agent cycles through the same sequence of responses across multiple turns.\n   - Never: Conversation progresses linearly without returning to earlier script segments.\n   - Always: The agent keeps revisiting the same multi-step script segment in a cycle.\n\n3. Failure to incorporate new input: The agent ignores or fails to build on information the user has already supplied.\n   - Never: Each user turn visibly affects the agent's next response.\n   - Always: The agent proceeds as if the user's input did not exist or was not understood.\n\n## Anti-bias Rules\n\n- Asking the user to re-enter information due to invalid input (e.g., wrong format) is NOT a loop.\n- Summarizing for confirmation is NOT repetition.\n- Short conversations may lack evidence for loops; default to 'never' if insufficient evidence.\n\n## Scoring\n\nSelect 'never' if no loop-like behavior occurs. Select 'occasionally' if 1-2 minor instances. Select 'frequently' if loop-like behavior causes noticeable friction. Select 'always' if the agent is clearly stuck.\n\n## Inputs\n\n<conversation>{{conversation}}</conversation>"
eval_tags:
- Agents
- Conversation
visible_ui: true
permissions:
  allow_edit: false
  allow_copy: true
choices:
- never
- occasionally
- frequently
- always
output_type_normalized: deterministic
config:
  required_keys:
  - conversation
  output: choices
  eval_type_id: AgentEvaluator
  param_modalities:
    conversation:
    - TEXT
    - AUDIO
    - JSON
    - LIST
    - NUMBER
    - BOOLEAN
    - INTEGER
    - FLOAT
    - ARRAY
    - DATETIME
  config_params_desc:
    conversation: The conversation to be evaluated
  rule_prompt: "You are evaluating whether the agent gets stuck in repetitive loops during the conversation.\n\n## Criteria\n\n1. Repetitive utterances: The agent reuses the same question or the same fallback response despite having already received relevant input.\n   - Never: Each question or fallback is used at most once when warranted.\n   - Always: The agent repeats the same question or \"Let me check on that\" three or more times despite prior answers.\n\n2. Multi-turn cycles: The agent cycles through the same sequence of responses across multiple turns.\n   - Never: Conversation progresses linearly without returning to earlier script segments.\n   - Always: The agent keeps revisiting the same multi-step script segment in a cycle.\n\n3. Failure to incorporate new input: The agent ignores or fails to build on information the user has already supplied.\n   - Never: Each user turn visibly affects the agent's next response.\n   - Always: The agent proceeds as if the user's input did not exist or was not understood.\n\n## Anti-bias Rules\n\n- Asking the user to re-enter information due to invalid input (e.g., wrong format) is NOT a loop.\n- Summarizing for confirmation is NOT repetition.\n- Short conversations may lack evidence for loops; default to 'never' if insufficient evidence.\n\n## Scoring\n\nSelect 'never' if no loop-like behavior occurs. Select 'occasionally' if 1-2 minor instances. Select 'frequently' if loop-like behavior causes noticeable friction. Select 'always' if the agent is clearly stuck.\n\n## Inputs\n\n<conversation>{{conversation}}</conversation>"
